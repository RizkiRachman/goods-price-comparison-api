openapi: 3.0.3
info:
  title: Receipt Endpoints
  version: 1.0.0

paths:
  /v1/receipts:
    post:
      summary: Create goods receipt
      description: |
        Create a new goods receipt with manual entry of store, items, and pricing.
      operationId: createReceipt
      tags:
        - Receipts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/ReceiptCreateRequest'
      responses:
        '200':
          description: Goods receipt created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptResultResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/upload:
    post:
      summary: Upload receipt image for OCR processing
      description: |
        Upload a receipt image (JPG, PNG, or PDF) for OCR processing.
        Returns a job ID to track the processing status.
      operationId: uploadReceipt
      tags:
        - Receipts
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Receipt image file (max 10MB)
              required:
                - image
      responses:
        '202':
          description: Upload successful, processing started
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptUploadResponse'
        '400':
          description: Invalid image format or size
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '413':
          description: Image exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{id}/status:
    get:
      summary: Check OCR processing status
      description: |
        Check the processing status of an uploaded receipt.
        Status values: PROCESSING, COMPLETED, FAILED
      operationId: getReceiptStatus
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID returned from upload
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptStatusResponse'
        '404':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{id}/results:
    get:
      summary: Get OCR results
      description: |
        Retrieve extracted data from a processed receipt.
        Only available when status is PENDING or later.
      operationId: getReceiptResults
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID returned from upload
      responses:
        '200':
          description: Results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptResultResponse'
        '404':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Processing not yet completed
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{id}/approve:
    post:
      summary: Approve receipt and get extracted data from receipt pending task and extract the data store into items
      description: |
        Approve the extracted receipt data and trigger ingestion into the system.
        Optionally submit corrected data before approving.
        Receipt must be in PENDING status.
      operationId: approveReceipt
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID returned from upload
      responses:
        '202':
          description: Approved, ingestion triggered
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptApproveResponse'
        '404':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Receipt not in PENDING status
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{id}/correct:
    post:
      summary: Correct OCR extraction data
      description: |
        Submit corrections to the OCR extraction result.
        Receipt must be in PENDING_APPROVAL status.
        Returns the corrected result.
      operationId: correctReceipt
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID returned from upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/ReceiptCorrectRequest'
      responses:
        '200':
          description: Corrections applied successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptResultResponse'
        '404':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Receipt not in PENDING_APPROVAL status
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{id}/reject:
    delete:
      summary: Reject receipt extraction result
      description: |
        Reject the OCR extraction result. Receipt must be in PENDING status.
      operationId: rejectReceipt
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID returned from upload
      responses:
        '200':
          description: Receipt rejected successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ReceiptRejectResponse'
        '404':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Receipt not in PENDING status
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/receipts/{receiptId}/bill-split:
    post:
      summary: Split a bill based on receipt
      description: |
        Compute a bill split for a receipt. Two modes:
        - **RATIO**: Equal split among N participants. Only `numberOfParticipants` is needed.
        - **SELECTION**: Item-based split. Each participant selects products and quantities they ordered.
          Unselected items are split equally among participants who did not select any items.

        Results are cached for 15 minutes. No persistent storage.
      operationId: splitBill
      tags:
        - Receipts
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Receipt ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/BillSplitRequest'
      responses:
        '200':
          description: Bill split computed successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/BillSplitResponse'
        '400':
          description: Invalid split request data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Receipt not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
