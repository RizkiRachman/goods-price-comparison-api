openapi: 3.0.3
info:
  title: Unit Endpoints
  version: 1.0.0

paths:
  /v1/units:
    get:
      summary: List units
      description: |
        Retrieve a paginated list of measurement units with optional
        filtering by type and search query.
      operationId: listUnits
      tags:
        - Units
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search units by name, symbol, or ID (partial match)
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [WEIGHT, VOLUME, QUANTITY]
          description: Filter by unit type
        - name: status
          in: query
          required: false
          schema:
            $ref: '../schemas/common.yaml#/components/schemas/EntityStatus'
          description: Filter by entity status
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [id, name, type, createdAt]
            default: name
          description: Field to sort by
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction
      responses:
        '200':
          description: Units retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/UnitListResponse'
    post:
      summary: Create a unit
      description: Create a new measurement unit
      operationId: createUnit
      tags:
        - Units
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/CreateUnitRequest'
      responses:
        '201':
          description: Unit created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Unit'
          headers:
            Location:
              description: URL of the created unit
              schema:
                type: string
                format: uri
                example: "http://localhost:8080/v1/units/KG"
        '400':
          description: Invalid unit data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Unit with this ID already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/units/{unitId}:
    get:
      summary: Get a unit by ID
      description: Retrieve detailed information about a specific measurement unit
      operationId: getUnit
      tags:
        - Units
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
          description: Unit ID (uppercase, e.g. KG, L, PCS)
      responses:
        '200':
          description: Unit retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Unit'
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
    put:
      summary: Update a unit
      description: Update an existing measurement unit's information
      operationId: updateUnit
      tags:
        - Units
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
          description: Unit ID (uppercase, e.g. KG, L, PCS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/UpdateUnitRequest'
      responses:
        '200':
          description: Unit updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Unit'
        '400':
          description: Invalid unit data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
