openapi: 3.0.3
info:
  title: Price Endpoints
  version: 1.0.0

paths:
  /v1/prices/search:
    post:
      summary: Search for product prices across stores
      description: |
        Search for product prices across all stores with filtering
        and sorting options.
      operationId: searchPrices
      tags:
        - Prices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/PriceSearchRequest'
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/PriceSearchResponse'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v2/prices/search:
    post:
      summary: Search for product prices (v2)
      description: |
        **VERSION 2** - Enhanced price search with additional features:
        - Pagination support
        - Advanced filtering (brand, category, store chain)
        - Price prediction
        - Historical price comparison

        This is an example of API versioning where v2 provides
        enhanced functionality over v1.
      operationId: searchPricesV2
      tags:
        - Prices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/v2/prices.yaml#/components/schemas/PriceSearchRequestV2'
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/v2/prices.yaml#/components/schemas/PriceSearchResponseV2'
          headers:
            X-API-Version:
              description: API version
              schema:
                type: string
                example: "v2"
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/prices/{priceId}:
    get:
      summary: Get a price record by ID
      description: Retrieve detailed information about a specific price record
      operationId: getPriceRecord
      tags:
        - Prices
      parameters:
        - name: priceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Price record ID
      responses:
        '200':
          description: Price record retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/PriceRecord'
        '404':
          description: Price record not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
    put:
      summary: Update a price record
      description: Update an existing price record's information
      operationId: updatePriceRecord
      tags:
        - Prices
      parameters:
        - name: priceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Price record ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/UpdatePriceRecordRequest'
      responses:
        '200':
          description: Price record updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/PriceRecord'
        '400':
          description: Invalid price data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Price record not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a price record
      description: Soft-delete a price record from the system
      operationId: deletePriceRecord
      tags:
        - Prices
      parameters:
        - name: priceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Price record ID
      responses:
        '204':
          description: Price record deleted successfully
        '404':
          description: Price record not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
