openapi: 3.0.3
info:
  title: Activity Log Endpoints
  version: 1.0.0

paths:
  /v1/activity-logs:
    get:
      summary: List activity logs
      description: |
        Retrieve a paginated list of activity logs with optional
        filtering by type, action, and date range.
      operationId: listActivityLogs
      tags:
        - ActivityLogs
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [RECEIPT, PRODUCT, STORE, PRICE_RECORD, CATEGORY, UNIT, FEEDBACK_QUESTION, ALERT]
          description: Filter by feature type
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [CREATE, UPDATE, DELETE]
          description: Filter by operation type
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start date for activity logs
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End date for activity logs
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [createdAt, type, action]
            default: createdAt
          description: Field to sort by
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction
      responses:
        '200':
          description: Activity logs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ActivityLogListResponse'

  /v1/activity-logs/{id}:
    get:
      summary: Get activity log by ID
      description: Retrieve a specific activity log record by its unique identifier
      operationId: getActivityLog
      tags:
        - ActivityLogs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Activity log unique identifier
      responses:
        '200':
          description: Activity log retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/ActivityLog'
        '404':
          description: Activity log not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
