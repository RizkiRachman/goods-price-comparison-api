openapi: 3.0.3
info:
  title: Product Endpoints
  version: 1.0.0

paths:
  /v1/products/trend/{productId}:
    get:
      summary: Get price trend for a product
      description: |
        Get price history and trend analysis for a specific product
        with configurable granularity.
      operationId: getProductTrend
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Product ID
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
          description: Data granularity
      responses:
        '200':
          description: Trend data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/ProductTrendResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
