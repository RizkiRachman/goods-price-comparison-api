openapi: 3.0.3
info:
  title: Category Endpoints
  version: 1.0.0

paths:
  /v1/categories:
    get:
      summary: List categories
      description: |
        Retrieve a paginated list of categories with optional search.
      operationId: listCategories
      tags:
        - Categories
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search categories by name or ID (partial match)
        - name: status
          in: query
          required: false
          schema:
            $ref: '../schemas/common.yaml#/components/schemas/EntityStatus'
          description: Filter by entity status
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [id, name, createdAt]
            default: name
          description: Field to sort by
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/responses.yaml#/components/schemas/CategoryListResponse'
    post:
      summary: Create a category
      description: Create a new product category
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Category'
          headers:
            Location:
              description: URL of the created category
              schema:
                type: string
                format: uri
                example: "http://localhost:8080/v1/categories/FOOD"
        '400':
          description: Invalid category data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Category with this ID already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'

  /v1/categories/{categoryId}:
    get:
      summary: Get a category by ID
      description: Retrieve detailed information about a specific category
      operationId: getCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
          description: Category ID (uppercase, e.g. FOOD, DAIRY)
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Category'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
    put:
      summary: Update a category
      description: Update an existing category's information
      operationId: updateCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
          description: Category ID (uppercase, e.g. FOOD, DAIRY)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests.yaml#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/models.yaml#/components/schemas/Category'
        '400':
          description: Invalid category data
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/ErrorResponse'
