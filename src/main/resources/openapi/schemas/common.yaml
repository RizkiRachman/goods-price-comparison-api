openapi: 3.0.3
info:
  title: Common Schemas
  version: 1.0.0

components:
  schemas:
    DateRange:
      type: object
      properties:
        from:
          type: string
          format: date
          description: Start date
          example: "2026-03-01"
        to:
          type: string
          format: date
          description: End date
          example: "2026-03-29"

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetails'

    ErrorDetails:
      type: object
      properties:
        code:
          type: string
          description: Error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Error message
          example: "Invalid request data"
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2026-03-29T10:30:00Z"
        path:
          type: string
          description: API path that caused the error
          example: "/api/prices/search"

    ValidationError:
      type: object
      properties:
        field:
          type: string
          description: Field with error
          example: "productName"
        message:
          type: string
          description: Validation error message
          example: "Product name is required"

    ApiVersionResponse:
      type: object
      description: API version information
      properties:
        version:
          type: string
          description: Current API version
          example: "v1"
        fullVersion:
          type: string
          description: Full semantic version
          example: "1.0.0"
        status:
          type: string
          description: API status
          enum: [ stable, beta, deprecated, sunset ]
          example: "stable"
        supportedVersions:
          type: array
          description: List of supported API versions
          items:
            type: object
            properties:
              version:
                type: string
                description: Version identifier
                example: "v1"
              status:
                type: string
                description: Version status
                enum: [ stable, beta, deprecated, sunset ]
                example: "stable"
              baseUrl:
                type: string
                description: Base URL for this version
                example: "/api/v1"
        deprecationInfo:
          type: object
          description: Deprecation information (only present if deprecated)
          nullable: true
          properties:
            deprecatedSince:
              type: string
              format: date
              description: Deprecation date
              example: "2026-06-01"
            sunsetDate:
              type: string
              format: date
              description: Date when version will be removed
              example: "2026-09-01"
            migrationGuide:
              type: string
              description: URL to migration guide
              example: "https://docs.goodsprice.com/migration/v1-to-v2"

    HealthResponse:
      type: object
      description: Health check response
      properties:
        status:
          type: string
          description: Overall health status
          enum: [ UP, DOWN ]
          example: "UP"
        components:
          type: object
          description: Health status of individual components
          properties:
            api:
              type: string
              description: API service status
              enum: [ UP, DOWN ]
              example: "UP"
            database:
              type: string
              description: Database connectivity status
              enum: [ UP, DOWN ]
              example: "UP"
            ocr:
              type: string
              description: OCR service status (if applicable)
              enum: [ UP, DOWN ]
              example: "UP"
        timestamp:
          type: string
          format: date-time
          description: Health check timestamp
          example: "2026-03-31T10:30:00Z"
        version:
          type: string
          description: Service version
          example: "1.2.1"

    MetricsResponse:
      type: object
      description: API metrics response
      properties:
        uptime:
          type: integer
          description: Service uptime in seconds
          example: 86400
        requests:
          type: object
          description: Request metrics
          properties:
            total:
              type: integer
              description: Total requests since startup
              example: 1024567
            successful:
              type: integer
              description: Successful requests (2xx responses)
              example: 1023000
            failed:
              type: integer
              description: Failed requests (4xx and 5xx responses)
              example: 1567
            ratePerMinute:
              type: number
              format: double
              description: Average requests per minute
              example: 712.5
        responseTime:
          type: object
          description: Response time statistics in milliseconds
          properties:
            average:
              type: number
              format: double
              description: Average response time
              example: 45.2
            p50:
              type: number
              format: double
              description: 50th percentile (median)
              example: 38.0
            p95:
              type: number
              format: double
              description: 95th percentile
              example: 120.5
            p99:
              type: number
              format: double
              description: 99th percentile
              example: 250.0
        errors:
          type: object
          description: Error metrics by type
          properties:
            validationErrors:
              type: integer
              description: Number of validation errors (400)
              example: 1234
            notFoundErrors:
              type: integer
              description: Number of not found errors (404)
              example: 56
            serverErrors:
              type: integer
              description: Number of server errors (500)
              example: 3
        timestamp:
          type: string
          format: date-time
          description: Metrics snapshot timestamp
          example: "2026-03-31T10:30:00Z"
    Status:
      type: string
      description: Processing status for async operations
      enum:
        - PENDING
        - PENDING_REVIEW
        - INGESTING
        - INGESTION_FAILED
        - APPROVED
        - REJECTED
        - FAILED
        - COMPLETED
      example: "PENDING"

    Pagination:
      type: object
      description: Pagination metadata for list endpoints
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        pageSize:
          type: integer
          description: Number of items per page
          example: 20
        totalItems:
          type: integer
          description: Total number of matching items
          example: 150
        totalPages:
          type: integer
          description: Total number of pages
          example: 8
        hasNext:
          type: boolean
          description: Whether there are more pages
          example: true
        hasPrevious:
          type: boolean
          description: Whether there are previous pages
          example: false

    SortDirection:
      type: string
      description: Sort direction
      enum: [asc, desc]
      default: asc
      example: asc

    EntityStatus:
      type: string
      description: |
        Lifecycle status for entities.
        Flow: pending → pending_review → pending_approval → approved → ingestion → completed
                                                          → rejected
                                                          → ingestion_failed
      enum:
        - pending
        - pending_review
        - pending_approval
        - approved
        - rejected
        - ingestion
        - ingestion_failed
        - completed
      example: pending
