openapi: 3.0.3
info:
  title: Goods Price Comparison API
  description: |
    REST API for the Goods Price Comparison Service.
    This API provides endpoints for:
    - Receipt upload and OCR processing
    - Price comparison across stores
    - Shopping route optimization
    - Price trend analysis
    - Price alerts
    - Product, store, and price management

    ## API Versioning

    This API uses URL path versioning. The current version is **v1**.

    ### Versioning Strategy
    - **URL Path**: Version is included in the URL path (e.g., `/v1/receipts/upload`)
    - **Breaking Changes**: Only introduced in new major versions (v2, v3, etc.)
    - **Deprecation**: Previous versions supported for 30 days after new version release
    - **Version Header**: `X-API-Version` header included in all responses

    ### Supported Versions
    - **v1** (current) - `/v1/*` - Initial release
    - **v2** (beta) - `/v2/*` - Enhanced features

    ### Version Lifecycle
    - **Beta**: Early access, may have breaking changes without notice
    - **Stable**: Production ready, fully supported
    - **Deprecated**: Still functional but will be removed
    - **Sunset**: No longer available

  version: 1.4.2
  x-api-id: goods-price-comparison-api
  x-api-version: v1
  contact:
    name: API Support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.goodsprice.com
    description: Production server

tags:
  - name: System
    description: System and API information endpoints
  - name: Receipts
    description: Receipt upload and OCR processing
  - name: Prices
    description: Price search, comparison, and management
  - name: Shopping
    description: Shopping route optimization
  - name: Products
    description: Product information, trends, and management
  - name: Stores
    description: Store information and management
  - name: Alerts
    description: Price alert subscriptions

