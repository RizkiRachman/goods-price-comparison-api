    PriceResultV2:
      type: object
      description: |
        **VERSION 2** - Enhanced price result with historical data and trends
      properties:
        storeId:
          type: integer
          format: int64
          description: Store identifier
          example: 1
        storeName:
          type: string
          description: Store name
          example: DIAMOND
        storeLocation:
          type: string
          description: Store location
          example: Poins Square
        storeChain:
          type: string
          description: Store chain/brand name
          example: Diamond Supermarket
        price:
          type: number
          format: double
          description: Current price
          example: 5600
        unitPrice:
          type: number
          format: double
          description: Price per unit
          example: 5600
        dateRecorded:
          type: string
          format: date-time
          description: Date and time price was recorded
          example: '2026-03-29T14:30:00Z'
        isPromo:
          type: boolean
          description: Whether this is a promotional price
          example: false
        promoDetails:
          type: object
          description: Promotion details (only if isPromo=true)
          nullable: true
          properties:
            promoType:
              type: string
              enum:
                - discount
                - bundle
                - buy_one_get_one
                - clearance
              description: Type of promotion
              example: discount
            discountPercentage:
              type: number
              format: double
              description: Discount percentage
              example: 10
            validUntil:
              type: string
              format: date-time
              description: Promotion end date
              example: '2026-04-05T23:59:59Z'
        priceHistory:
          type: array
          description: 30-day price history (only if includeHistory=true)
          nullable: true
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                description: Date of price record
                example: '2026-03-01'
              price:
                type: number
                format: double
                description: Price on that date
                example: 5800
        priceChange:
          type: object
          description: Price change statistics
