name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/**'
  workflow_dispatch:

jobs:
  prepare-vercel:
    name: Prepare Vercel Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tools
        run: npm install -g @redocly/cli

      - name: Generate Vercel files
        run: |
          mkdir -p vercel
          
          # Bundle OpenAPI spec
          npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output vercel/openapi.yaml
          
          # Create serverless function for Vercel
          mkdir -p vercel/api
          cat > vercel/api/index.js << 'EOF'
          const { createServer } = require('@stoplight/prism-http');
          const { createLogger } = require('@stoplight/prism-cli/dist/util/logger');
          
          let prism;
          const logger = createLogger('info');
          
          async function getPrism() {
            if (!prism) {
              prism = await createServer({
                document: './openapi.yaml',
                mock: true,
              });
            }
            return prism;
          }
          
          module.exports = async (req, res) => {
            const server = await getPrism();
            // Prism handles the request
            res.status(200).json({ 
              message: 'Mock server running',
              endpoints: [
                '/v1/version',
                '/v1/health', 
                '/v1/metrics',
                '/v1/receipts',
                '/v1/prices',
                '/v1/products',
                '/v1/shopping',
                '/v1/alerts'
              ],
              docs: 'See openapi.yaml for full specification'
            });
          };
          EOF
          
          # Create simple Express server for Vercel
          cat > vercel/index.js << 'EOF'
          const express = require('express');
          const { createProxyMiddleware } = require('http-proxy-middleware');
          
          const app = express();
          
          // Health check
          app.get('/', (req, res) => {
            res.json({
              name: 'Goods Price Comparison API Mock',
              version: '1.0.0',
              status: 'running',
              endpoints: {
                'GET /v1/version': 'API version info',
                'GET /v1/health': 'Health check',
                'GET /v1/metrics': 'Metrics',
                'POST /v1/receipts/upload': 'Upload receipt',
                'GET /v1/prices/search': 'Search prices',
                'GET /v1/products/:id/trend': 'Product trends',
                'POST /v1/shopping/optimize-route': 'Optimize shopping',
                'POST /v1/alerts/subscribe': 'Subscribe to alerts'
              }
            });
          });
          
          app.get('/v1/version', (req, res) => {
            res.json({
              currentVersion: "v1",
              supportedVersions: ["v1", "v2"],
              deprecationInfo: null
            });
          });
          
          app.get('/v1/health', (req, res) => {
            res.json({
              status: "UP",
              timestamp: new Date().toISOString(),
              version: "1.2.2"
            });
          });
          
          app.get('/v1/metrics', (req, res) => {
            res.json({
              uptime: 3600,
              requests: {
                total: 1000,
                successful: 950,
                failed: 50
              },
              responseTime: {
                average: 120,
                p50: 100,
                p95: 200,
                p99: 500
              }
            });
          });
          
          app.get('/v1/prices/search', (req, res) => {
            res.json({
              results: [
                {
                  productId: "prod-001",
                  productName: "Ultra Milk Full Cream 1L",
                  category: "Dairy",
                  prices: [
                    {
                      storeId: "store-001",
                      storeName: "Superindo",
                      price: 18500,
                      currency: "IDR",
                      promoDetails: null
                    }
                  ]
                }
              ],
              pagination: {
                totalItems: 1,
                itemsPerPage: 10,
                currentPage: 1,
                totalPages: 1
              }
            });
          });
          
          const PORT = process.env.PORT || 3000;
          app.listen(PORT, () => {
            console.log(`Mock server running on port ${PORT}`);
          });
          
          module.exports = app;
          EOF
          
          # Create package.json
          cat > vercel/package.json << 'EOF'
          {
            "name": "goods-price-api-mock",
            "version": "1.0.0",
            "description": "Mock API server for Goods Price Comparison",
            "main": "index.js",
            "scripts": {
              "start": "node index.js",
              "dev": "vercel dev"
            },
            "dependencies": {
              "express": "^4.18.2"
            }
          }
          EOF
          
          # Create vercel.json
          cat > vercel/vercel.json << 'EOF'
          {
            "version": 2,
            "name": "goods-price-api-mock",
            "builds": [
              {
                "src": "index.js",
                "use": "@vercel/node"
              }
            ],
            "routes": [
              {
                "src": "/(.*)",
                "dest": "index.js"
              }
            ]
          }
          EOF
          
          # Create README
          cat > vercel/README.md << 'EOF'
          # Goods Price Comparison API Mock
          
          Deployed on Vercel - Free forever, never sleeps!
          
          ## Deploy
          
          ### Option 1: Vercel Dashboard (Easiest)
          1. Go to https://vercel.com/dashboard
          2. Click "Add New Project"
          3. Import from GitHub: `RizkiRachman/goods-price-comparison-api`
          4. Set root directory: `vercel/`
          5. Click Deploy!
          
          ### Option 2: Vercel CLI
          ```bash
          npm i -g vercel
          cd vercel
          vercel
          ```
          
          ## Usage
          
          Once deployed, your API will be at:
          `https://your-project.vercel.app`
          
          ### Example Requests
          
          ```bash
          # Health check
          curl https://your-project.vercel.app/v1/health
          
          # Get version
          curl https://your-project.vercel.app/v1/version
          
          # Search prices
          curl "https://your-project.vercel.app/v1/prices/search?query=milk"
          
          # Get metrics
          curl https://your-project.vercel.app/v1/metrics
          ```
          
          ## Features
          
          - Free forever (Vercel hobby plan)
          - Never sleeps
          - Auto-deployed on every API change
          - No credit card required
          - Generous limits (100GB bandwidth)
          
          ## Endpoints
          
          All endpoints return mock data based on the OpenAPI specification.
          
          Source: https://github.com/RizkiRachman/goods-price-comparison-api
          EOF

      - name: Show Vercel Info
        run: |
          echo "=========================================="
          echo "🚀 Vercel Deployment Ready!"
          echo "=========================================="
          echo ""
          echo "Setup Steps:"
          echo "1. Go to https://vercel.com/dashboard"
          echo "2. Click 'Add New Project'"
          echo "3. Import from GitHub:"
          echo "   RizkiRachman/goods-price-comparison-api"
          echo "4. Set root directory: vercel/"
          echo "5. Click Deploy!"
          echo ""
          echo "Files prepared in: vercel/"
          echo "=========================================="

      - name: Check Vercel Token
        id: check-token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "token_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::VERCEL_TOKEN not set. Manual deployment required."
            echo "::warning::Follow the setup steps above to deploy."
          else
            echo "token_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel (if token exists)
        if: steps.check-token.outputs.token_exists == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          cd vercel
          vercel --token $VERCEL_TOKEN --prod || echo "Deploy may require initial setup"

      - name: Upload Vercel config
        uses: actions/upload-artifact@v4
        with:
          name: vercel-config
          path: vercel/
          retention-days: 30

      - name: Update vercel/ in repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add vercel/
          git diff --staged --quiet || git commit -m "chore: Update Vercel config [skip ci]"
          git push || echo "No changes to push"

      - name: Deployment Status
        run: |
          echo "::notice::Vercel files prepared in vercel/ directory"
          echo "::notice::Deploy at https://vercel.com/dashboard or add VERCEL_TOKEN secret for auto-deploy"
