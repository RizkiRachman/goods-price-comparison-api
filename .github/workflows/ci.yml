name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.spectral.yaml'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Stage 1: Lint OpenAPI Specification
  # ==========================================
  lint:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6.11.0
      
      - name: Run Spectral linting
        run: spectral lint src/main/resources/openapi/main.yaml --ruleset .spectral.yaml --format stylish

  # ==========================================
  # Stage 2: Build with Docker/Podman
  # ==========================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Build using Dockerfile (multi-stage)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: builder
          push: false
          load: true
          tags: api-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Run tests in container
      - name: Run tests
        run: |
          docker run --rm api-builder:latest mvn test
      
      # Extract built artifact
      - name: Extract JAR artifact
        run: |
          docker create --name extract api-builder:latest
          docker cp extract:/build/target/ ./
          docker rm extract
      
      # Upload artifact for next jobs
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: target/*.jar
          retention-days: 1

  # ==========================================
  # Stage 3: Code Quality Checks
  # ==========================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: api-jar
          path: target/
      
      - name: Run Checkstyle
        run: mvn checkstyle:check
      
      - name: Run SpotBugs
        run: mvn spotbugs:check

  # ==========================================
  # Stage 4: Publish to GitHub Packages
  # ==========================================
  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: [build, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: api-jar
          path: target/
      
      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Stage 5: Build OCI Image (Podman/Docker)
  # ==========================================
  container:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push OCI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: exporter
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
