name: Generate Mock Server

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-mock-server:
    name: Generate Mock Server Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tools
        run: npm install -g @redocly/cli @stoplight/prism-cli

      - name: Bundle OpenAPI spec
        run: npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output mock-server/openapi.yaml

      - name: Create Docker Compose config
        run: |
          cat > mock-server/docker-compose.yml << 'EOF'
          version: '3.8'
          services:
            mock-api:
              image: stoplight/prism:4
              command: mock /openapi.yaml --host 0.0.0.0 --port 4010
              volumes:
                - ./openapi.yaml:/openapi.yaml:ro
              ports:
                - "4010:4010"
              environment:
                - NODE_ENV=production
          EOF

      - name: Create README
        run: |
          cat > mock-server/README.md << 'EOF'
          # 🎭 Goods Price Comparison API - Mock Server

          ## Quick Start

          ### Option 1: Docker (Recommended)
          ```bash
          cd mock-server
          docker-compose up
          ```

          Mock server runs at: http://localhost:4010

          ### Option 2: Prism CLI (Local install)
          ```bash
          npm install -g @stoplight/prism-cli
          prism mock mock-server/openapi.yaml
          ```

          ## Usage Examples

          ```bash
          # Get API version
          curl http://localhost:4010/v1/version

          # Search prices
          curl "http://localhost:4010/v1/prices/search?query=milk&location=jakarta"

          # Get health status
          curl http://localhost:4010/v1/health

          # Upload receipt (returns mock response)
          curl -X POST http://localhost:4010/v1/receipts/upload \
            -F "file=@receipt.jpg"
          ```

          ## Features

          - ✅ Returns example responses from OpenAPI spec
          - ✅ Validates requests against schema
          - ✅ Supports all 11 API endpoints
          - ✅ Always synced with latest API changes
          - ✅ No signup or API keys required

          ## Auto-Update

          This mock server is automatically regenerated on every API change.
          Last updated: $(date)
          EOF

      - name: Create package.json for Glitch deployment
        run: |
          cat > mock-server/package.json << 'EOF'
          {
            "name": "goods-price-api-mock",
            "version": "1.0.0",
            "description": "Mock server for Goods Price Comparison API",
            "scripts": {
              "start": "prism mock openapi.yaml --host 0.0.0.0 --port 3000"
            },
            "dependencies": {
              "@stoplight/prism-cli": "^4.14.1"
            },
            "engines": {
              "node": ">=14"
            }
          }
          EOF

      - name: Upload mock server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mock-server
          path: mock-server/
          retention-days: 90

      - name: Post mock server info
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ## 🎭 Mock Server Generated
            
            A mock server has been generated from the latest OpenAPI specification.
            
            ### Quick Start (No signup required!)
            
            **Option 1: Docker (Easiest)**
            \`\`\`bash
            # Download mock server files
            curl -L -o mock-server.zip https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/mock-server
            
            # Run with Docker
            cd mock-server
            docker-compose up
            \`\`\`
            
            **Option 2: Node.js**
            \`\`\`bash
            cd mock-server
            npm install
            npm start
            \`\`\`
            
            **Mock server URL:** http://localhost:4010
            
            ### Example Requests
            
            \`\`\`bash
            # Get API version
            curl http://localhost:4010/v1/version
            
            # Search prices
            curl "http://localhost:4010/v1/prices/search?query=milk"
            
            # Check health
            curl http://localhost:4010/v1/health
            \`\`\`
            
            ### Deploy to Free Platforms
            
            - **[Glitch](https://glitch.com)**: Import from GitHub, free forever
            - **[Railway](https://railway.app)**: Free tier, no credit card
            - **[Fly.io](https://fly.io)**: Free tier, credit card required
            
            ---
            _Mock server files available in Actions artifacts or \`mock-server\` directory_
            `;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Commit mock server to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mock-server/
          git diff --staged --quiet || git commit -m "chore: Update mock server [skip ci]"
          git push || echo "No changes to push"
