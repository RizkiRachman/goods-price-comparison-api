name: Deploy API Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/main.yaml'
      - 'src/main/resources/openapi/paths/**'
      - 'src/main/resources/openapi/schemas/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@1.10.0

      - name: Get API Version
        id: get-version
        run: |
          VERSION=$(grep "version:" src/main/resources/openapi/main.yaml | head -1 | sed 's/.*version: //')
          echo "api_version=$VERSION" >> $GITHUB_OUTPUT
          echo "API Version: $VERSION"

      - name: Bundle OpenAPI spec
        run: |
          npx @redocly/cli bundle src/main/resources/openapi/main.yaml \
            --output site/openapi.yaml

      - name: Generate HTML documentation
        run: |
          npx @redocly/cli build-docs site/openapi.yaml \
            --output site/index.html \
            --title "Goods Price Comparison API" \
            --disableGoogleFont

      - name: Create custom landing page
        run: |
          cat > site/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Goods Price Comparison API Documentation</title>
              <meta name="description" content="REST API documentation for Goods Price Comparison Service">
              <style>
                  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
                  .api-info { padding: 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
                  .api-info h1 { margin: 0 0 10px 0; }
                  .api-info p { margin: 5px 0; color: #666; }
                  .api-info a { color: #0066cc; }
                  redoc { display: block; }
              </style>
              <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700">
          </head>
          <body>
              <div class="api-info">
                  <h1>Goods Price Comparison API</h1>
                  <p>Version: ${{ steps.get-version.outputs.api_version }} | <a href="https://github.com/RizkiRachman/goods-price-comparison-api">View on GitHub</a></p>
                  <p>REST API for receipt OCR, price comparison, shopping optimization, and price alerts.</p>
              </div>
              <redoc spec-url="openapi.yaml"></redoc>
              <script src="https://cdn.redoc.ly/redoc/v2.1.3/bundles/redoc.standalone.js"></script>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
