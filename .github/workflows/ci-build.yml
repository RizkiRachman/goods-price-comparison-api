name: CI - Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.spectral.yaml'
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @stoplight/spectral-cli@6.11.0
      - run: spectral lint src/main/resources/openapi/main.yaml --ruleset .spectral.yaml

  breaking-change-detection:
    name: Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAPI Diff
        run: npm install -g @useoptic/optic

      - name: Bundle current OpenAPI spec
        run: |
          npm install -g @redocly/cli
          npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output current.yaml

      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git checkout origin/${{ github.base_ref }} -- src/main/resources/openapi/
          npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output base.yaml

      - name: Check for breaking changes
        id: breaking-check
        run: |
          optic diff base.yaml current.yaml --check > diff-output.txt 2>&1 || true
          if grep -q "breaking" diff-output.txt; then
            echo "::error::Breaking changes detected in API!"
            cat diff-output.txt
            exit 1
          else
            echo "✅ No breaking changes detected"
            cat diff-output.txt
          fi

      - name: Post PR comment (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Breaking API Changes Detected**\n\nThis PR contains changes that may break existing API consumers. Please:\n1. Review the breaking changes above\n2. Consider versioning the API if breaking changes are intentional\n3. Update the migration guide if applicable'
            })

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn clean package -DskipTests -q
      - run: mvn test
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 1

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: api-jar
          path: target/
      - run: mvn checkstyle:check
      - run: mvn spotbugs:check
