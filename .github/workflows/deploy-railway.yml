name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/**'
  workflow_dispatch:

jobs:
  deploy-railway:
    name: Deploy Mock Server to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Bundle OpenAPI spec
        run: |
          npm install -g @redocly/cli
          npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output railway/openapi.yaml

      - name: Prepare Railway files
        run: |
          mkdir -p railway
          
          # Create package.json
          cat > railway/package.json << 'EOF'
          {
            "name": "goods-price-api-mock",
            "version": "1.0.0",
            "description": "Mock API server for Goods Price Comparison",
            "scripts": {
              "start": "prism mock openapi.yaml --host 0.0.0.0 --port $PORT"
            },
            "dependencies": {
              "@stoplight/prism-cli": "^4.14.1"
            },
            "engines": {
              "node": ">=16"
            }
          }
          EOF
          
          # Create Procfile for Railway
          echo "web: npm start" > railway/Procfile
          
          # Create README
          cat > railway/README.md << 'EOF'
          # Goods Price Comparison API - Mock Server
          
          Deployed on Railway free tier.
          
          ## Usage
          
          Base URL: https://your-app-name.railway.app
          
          ### Example Requests
          
          ```bash
          # Get API version
          curl https://your-app-name.railway.app/v1/version
          
          # Search prices
          curl "https://your-app-name.railway.app/v1/prices/search?query=milk"
          
          # Health check
          curl https://your-app-name.railway.app/v1/health
          ```
          
          ## Features
          
          - Returns example responses from OpenAPI spec
          - Auto-deployed on every API change
          - Free tier (sleeps after inactivity)
          
          Source: https://github.com/RizkiRachman/goods-price-comparison-api
          EOF

      - name: Show Railway Info
        run: |
          echo "=========================================="
          echo "🚂 Railway Deployment Ready!"
          echo "=========================================="
          echo ""
          echo "Setup Instructions:"
          echo "1. Go to https://railway.app"
          echo "2. Create account (free tier)"
          echo "3. New Project → Deploy from GitHub repo"
          echo "4. Select this repository"
          echo "5. Set root directory: railway/"
          echo "6. Deploy!"
          echo ""
          echo "Files prepared in: railway/"
          echo "=========================================="

      - name: Check Railway Token
        id: check-token
        run: |
          if [ -z "${{ secrets.RAILWAY_API_TOKEN }}" ]; then
            echo "token_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::RAILWAY_API_TOKEN not set. Auto-deployment disabled."
            echo "::warning::Set RAILWAY_API_TOKEN in GitHub Secrets to enable auto-deploy."
          else
            echo "token_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Railway (if token exists)
        if: steps.check-token.outputs.token_exists == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          cd railway
          railway login --token $RAILWAY_TOKEN
          railway up --detach || echo "Railway deploy may require manual project setup"
          echo "::notice::Deployed to Railway! Check dashboard for URL."

      - name: Upload Railway config
        uses: actions/upload-artifact@v4
        with:
          name: railway-config
          path: railway/
          retention-days: 30

      - name: Update railway/ in repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add railway/
          git diff --staged --quiet || git commit -m "chore: Update Railway config [skip ci]"
          git push || echo "No changes to push"

      - name: Deployment Status
        run: |
          echo "::notice::Railway files prepared in railway/ directory"
          echo "::notice::Deploy manually at https://railway.app or add RAILWAY_API_TOKEN secret for auto-deploy"
