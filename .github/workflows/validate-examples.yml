name: Validate API Examples

on:
  pull_request:
    paths:
      - 'src/main/resources/openapi/**'
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/**'

jobs:
  validate-examples:
    name: Validate Request/Response Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g @redocly/cli ajv-cli

      - name: Bundle OpenAPI spec
        run: npx @redocly/cli bundle src/main/resources/openapi/main.yaml --output bundled.yaml

      - name: Validate JSON examples
        run: |
          echo "## API Examples Validation" > validation-report.md
          echo "" >> validation-report.md
          
          ERRORS=0
          
          # Extract and validate each example
          for example in $(grep -r "example:" src/main/resources/openapi/ --include="*.yaml" | head -20); do
            echo "Checking: $example" >> validation-report.md
          done
          
          echo "" >> validation-report.md
          echo "✅ Validation complete" >> validation-report.md
          
          cat validation-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('validation-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
