name: Code Generation Test

on:
  pull_request:
    paths:
      - 'src/main/resources/openapi/**'
      - 'pom.xml'
  push:
    branches: [main]
    paths:
      - 'src/main/resources/openapi/**'
      - 'pom.xml'

jobs:
  test-code-generation:
    name: Test Java Code Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate code
        run: mvn clean compile -q

      - name: Verify generated files exist
        run: |
          if [ ! -d "target/generated-sources/openapi/src/gen/java/main" ]; then
            echo "❌ Generated sources directory not found"
            exit 1
          fi
          
          FILE_COUNT=$(find target/generated-sources/openapi -name "*.java" | wc -l)
          echo "✅ Generated $FILE_COUNT Java files"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ No Java files generated"
            exit 1
          fi

      - name: Compile generated code
        run: |
          mvn compiler:compile -q
          echo "✅ Generated code compiles successfully"

      - name: Test generated DTOs
        run: |
          # Check that model classes exist
          if [ ! -f "target/classes/com/example/goodsprice/api/model/PriceResult.class" ]; then
            echo "❌ Generated DTO classes not found"
            exit 1
          fi
          
          echo "✅ Generated DTOs validated"

      - name: Report status
        if: always()
        run: |
          echo "## Code Generation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ OpenAPI spec parsed successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Java code generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code compiles without errors" >> $GITHUB_STEP_SUMMARY
          echo "✅ DTOs validated" >> $GITHUB_STEP_SUMMARY
